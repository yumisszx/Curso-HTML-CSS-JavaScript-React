<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <div class="container">
        <!--header-->
        <header>
            <h3>Cadastre seu veículo para vender mais rápido!</h3>
        </header>
    </div>

    <div action="##" class="form-container">
        <section class="form-header">
            <p>Formulário</p>
        </section>

        <section class="form-body">
            <h1>Venda fácil seu carro!</h1>

            <p>Descreva as características e marque os opcionais que ele posssui.</p>

            <form>
                <!--titulo-->
                <div class="box-input">
                    <label for="title">Título do anúncio <span class="required-field">*</span></label>

                    <input 
                    type="text" 
                    name="title" 
                    id="title" 
                    class="block" 
                    placeholder="Um título para anunciar seu carro" 
                    minlength="1" 
                    maxlength="30" 
                    required>
                </div>

                <!--preço-->
                <div class="box-input">
                    <label for="price">Preço <span class="required-field">*</span></label>

                    <input 
                    type="number" 
                    name="price" 
                    id="price" 
                    class="block" 
                    placeholder="Defina o preço" 
                    required>
                </div>

                <!--descrição-->
                <div class="box-input">
                    <label for="description">Descrição <span class="required-field">*</span></label>

                    <textarea 
                    name="description" 
                    id="description"
                    class="block"
                    placeholder="Coloque os detalhes do veículo, ex: possui algum arranhão">
                    </textarea>
                </div>

                <!--marca-->
                <div class="box-input">
                    <label for="brand">Marca <span class="required-field">*</span></label>

                    <input 
                    type="text" 
                    name="brand" 
                    id="brand" 
                    class="block" 
                    placeholder="Digite a marca do veículo"
                    required>
                </div>

                <!--modelo-->
                <div class="box-input">
                    <label for="model">Modelo <span class="required-field">*</span></label>

                    <input 
                    type="text" 
                    name="model" 
                    id="model" 
                    class="block" 
                    placeholder="Digite o modelo do veículo"
                    required>
                </div>

                <!--kilometragem-->
                <div class="box-input">
                    <label for="mileage">Kilometragem <span class="required-field">*</span></label>

                    <input 
                    type="number" 
                    name="mileage" 
                    id="mileage" 
                    class="block" 
                    placeholder="Digite a kilometragem do veículo"
                    required>
                </div>

                <!--data compra-->
                <div class="box-input">
                    <label for="purchase_date">Data de compra <span class="required-field">*</span></label>

                    <input 
                    type="date" 
                    name="purchase_date" 
                    id="purchase_date" 
                    class="block" 
                    placeholder="Digite a kilometragem do veículo"
                    required>
                </div>

                <!--câmbio-->
                <div class="box-input">
                    <p>Tipo de câmbio: <span class="required-field">*</span></p>

                    <input type="radio" id="manual" name="gear">
                    <label for="manual">Manual</label>
                    
                    <input type="radio" id="auto" name="gear">
                    <label for="auto">Automático</label>
                </div>

                <!--opcionais-->
                <div class="optional-box">
                    <p>Opcionais </p>

                    <ul class="optional-list">
                        <!--airbag-->
                        <li>
                            <input 
                            type="checkbox" 
                            id="airbag" 
                            name="optional[]" 
                            value="airbag">

                            <label for="airbag">Airbag</label>
                        </li>

                        <!--alarme-->
                        <li>
                            <input 
                            type="checkbox" 
                            id="alarm" 
                            name="optional[]" 
                            value="alarm">

                            <label for="alarm">Alarme</label>
                        </li>

                        <!--ar condicionado-->
                        <li>
                            <input 
                            type="checkbox" 
                            id="ac" 
                            name="optional[]" 
                            value="ac">

                            <label for="ac">Ar condicionado</label>
                        </li>

                        <!--camera ré-->
                        <li>
                            <input 
                            type="checkbox" 
                            id="reverse_camera" 
                            name="optional[]" 
                            value="reverse_camera">

                            <label for="reverse_camera">Câmera de ré</label>
                        </li>
                    </ul>
                </div>

                <!--opcionais2-->
                <div class="optional-box">

                    <ul class="optional-list">
                        <!--assistente pista-->
                        <li>
                            <input 
                            type="checkbox" 
                            id="lane_assist" 
                            name="optional[]" 
                            value="lane_assist">

                            <label for="lane_assist">Assitente de pista</label>
                        </li>

                        <!--keyless-->
                        <li>
                            <input 
                            type="checkbox" 
                            id="keyless" 
                            name="optional[]" 
                            value="keyless">

                            <label for="keyless">Partida keyless</label>
                        </li>

                        <!--integração celular-->
                        <li>
                            <input 
                            type="checkbox" 
                            id="smartphone" 
                            name="optional[]" 
                            value="smartphone">

                            <label for="smartphone">Integração com celular</label>
                        </li>

                        <!--banco couro-->
                        <li>
                            <input 
                            type="checkbox" 
                            id="leather_seat" 
                            name="optional[]" 
                            value="leather_seat">

                            <label for="leather_seat">Banco de couro</label>
                        </li>
                    </ul>
                </div>

                <!--fotos-->
                <div class="box-input">
                    <p>Fotos do carro: <span class="required-field">*</span></p>

                    <input 
                    type="file"
                    multiple
                    accept="image/png, image/jpg"
                    id="images"
                    name="images"
                    required>
                </div>

                <input type="submit" value="Enviar" class="btn-submit">
            </form>
        </section>

    </div>

</body>

</html>
